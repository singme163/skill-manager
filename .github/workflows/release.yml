name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: ./Scripts/test.sh
      - name: Build dmg
        run: ./Scripts/make-dmg.sh
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SkillManager.dmg
          generate_release_notes: true
